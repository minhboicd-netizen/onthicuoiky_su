      { id: "p1_q34", type: "multiple_choice", question: "Câu 34. Con đường cứu nước của dân tộc Việt Nam do Nguyễn Ái Quốc xác định có sự khác biệt hoàn toàn so với các con đường cứu nước trước đó về điểm nào sau đây?", options: ["A. Hình thức, phương pháp đấu tranh.", "B. Mục tiêu trực tiếp, trước mắt.", "C. Xác định đối tượng cách mạng.", "D. Phương hướng tiến lên."], correct_answer: 3 },
      { id: "p1_q35", type: "multiple_choice", question: "Câu 35. Nội dung nào sau đây không đúng về ý nghĩa của sự kiện Nguyễn Ái Quốc tìm thấy con đường cứu nước cho dân tộc Việt Nam?", options: ["A. Chấm dứt thời kì khủng hoảng về con đường cứu nước ở Việt Nam.", "B. Chuẩn bị trực tiếp cho sự ra đời các tổ chức cộng sản ở Việt Nam.", "C. Chuẩn bị các điều kiện cho sự ra đời của Đảng Cộng sản Việt Nam.", "D. Gắn phong trào cách mạng của Việt Nam với cách mạng thế giới."], correct_answer: 1 },
      { id: "p1_q36", type: "multiple_choice", question: "Câu 36. Một trong những điểm tương đồng trong các hoạt động đối ngoại của Nguyễn Ái Quốc và Phan Bội Châu là ở", options: ["A. kết quả.", "B. mục tiêu.", "C. hướng đi.", "D. nhận thức."], correct_answer: 1 },
      { id: "p1_q37", type: "multiple_choice", question: "Câu 37. Trong quá trình chuẩn bị về tổ chức để thành lập Đảng Cộng sản của Việt Nam (1919 - 1929), Nguyễn Ái Quốc có sự sáng tạo nào sau đây?", options: ["A. Chủ nhiệm, kiêm chủ bút cho tờ báo Người cùng khổ để tuyên truyền cách mạng.", "B. Xuất bản cuốn Đường Kách mệnh, bí mật gửi về nước để tuyên truyền cách mạng,", "C. Thành lập các tổ chức tiền cộng sản trước khi thành lập Đảng Cộng sản Việt Nam.", "D. Viết tác phẩm Bản án chế độ dân Pháp để tố cáo những tội ác của thực dân Pháp."], correct_answer: 2 },
      { id: "p1_q38", type: "multiple_choice", question: "Câu 38. Tại Hội nghị thành lập Đảng Cộng sản Việt Nam (đầu năm 1930), vai trò nào sau đây của Nguyễn Ái Quốc thể hiện sự vận dụng sáng tạo chủ nghĩa Mác - Lê-nin ở Việt Nam?", options: ["A. Xác định phương hướng tiến lên.", "B. Xác định lực lượng nòng cốt.", "C. Xác định lực lượng cách mạng.", "D. Xác định giai cấp lãnh đạo."], correct_answer: 2 },
      { id: "p1_q39", type: "multiple_choice", question: "Câu 39. Yếu tố nào sau đây không ảnh hưởng đến hành trình cứu nước và hoạt động cách mạng của Nguyễn Ái Quốc - Hồ Chí Minh (1911 - 1969)?", options: ["A. Đất nước bị mất độc lập, nhân dân bị áp bức, bóc lột.", "B. Truyền thống gia đình và sự nhận thức của cá nhân.", "C. Xu thế hoà hoãn Đông - Tây và xu thế toàn cầu hoá.", "D. Những truyền thống tốt đẹp của dân tộc và quê hương."], correct_answer: 2 },
      { id: "p1_q40", type: "multiple_choice", question: "Câu 40. Trong cuộc đời hoạt động cách mạng (1911 - 1969), Nguyễn Ái Quốc - Hồ Chí Minh được kế thừa những truyền thống nào sau đây của quê hương Nghệ An và gia đình?", options: ["A. Truyền thống khoa bảng và tinh thần chống phát xít.", "B. Yêu chuộng hoà bình, chống chủ nghĩa phát xít.", "C. Truyền thống hiếu học và chống phong kiến.", "D. Truyền thống yêu nước, hiếu học và đoàn kết."], correct_answer: 3 },
      { id: "p1_q41", type: "multiple_choice", question: "Câu 41. Trong những năm 1920 - 1930, hoạt động yêu nước và cách mạng của Nguyễn Ái Quốc không có sự kiện nào sau đây?", options: ["A. Xác định con đường cứu nước theo khuynh hướng cách mạng vô sản.", "B. Lựa chọn con đường cứu nước theo khuynh hướng cách mạng vô sản.", "C. Trở về nước và trực tiếp lãnh đạo cuộc vận động giải phóng dân tộc.", "D. Chuẩn bị các điều kiện cho việc thành lập Đảng Cộng sản Việt Nam."], correct_answer: 2 },
      { id: "p1_q42", type: "multiple_choice", question: "Câu 42. Nội dung nào sau đây ghi nhận Hồ Chí Minh là nhà lãnh đạo chủ chốt trong lịch sử dân tộc (từ năm 1945 đến năm 1969)?", options: ["A. Chủ trì các hội nghị của Đảng, hoạch định đường lối cách mạng.", "B. Chỉ huy các chiến dịch trong suốt cuộc kháng chiến chống Mỹ.", "C. Kết nối phong trào cách mạng Việt Nam với cách mạng thế giới.", "D. Trực tiếp chỉ đạo cuộc Tổng tiến công và giải phóng Xuân năm 1975."], correct_answer: 0 },
      { id: "p1_q43", type: "multiple_choice", question: "Câu 43. Trong những năm kháng chiến chống thực dân Pháp (1945 - 1954), Chủ tịch Hồ Chí Minh có vai trò nổi bật nào sau đây?", options: ["A. Hoạch định đường lối xây dựng và bảo vệ chế độ mới.", "B. Đề ra kế hoạch Tổng tiến công và nổi dậy ở Việt Bắc.", "C. Chủ trì Đại hội đại biểu toàn quốc lần thứ III của Đảng.", "D. Trực tiếp chỉ đạo xây dựng chủ nghĩa xã hội ở miền Bắc."], correct_answer: 0 },
      { id: "p1_q44", type: "multiple_choice", question: "Câu 44. Sự kiện nào sau đây không có trong cuộc hành trình tìm đường cứu nước (1911 - 1920) của Nguyễn Tất Thành - Nguyễn Ái Quốc?", options: ["A. Tham gia hoạt động trong tổ chức Hội những người Việt Nam yêu nước ở Pháp.", "B. Bỏ phiếu tán thành việc Đảng Xã hội Pháp gia nhập Quốc tế thứ ba do Lê-nin sáng lập.", "C. Gặp gỡ V.I. Lê-nin trong Đại hội thành lập Quốc thế thứ ba tổ chức tại Mát-xcơ-va.", "D. Gửi tới Hội nghị Véc-xai bản Yêu sách của nhân dân An Nam đòi quyền lợi dân tộc."], correct_answer: 2 },

      {
        id: "p2_q7", type: "true_false",
        question: "Câu 7. Đọc đoạn tư liệu sau:\n“Sinh ra và lớn lên trong bối cảnh đất nước đã trở thành thuộc địa... Nguyễn Tất Thành sớm có ý chí đánh đuổi thực dân, giải phóng đồng bào. Tuy rất khâm phục tinh thần yêu nước của các bậc tiền bối, nhưng Người không tán thành những con đường của họ mà quyết tâm ra đi tìm một con đường cứu nước mới. Nguyễn Tất Thành hướng tới phương Tây... Ngày 5-6-1911... bắt đầu cuộc hành trình tìm đường cứu nước”.",
        statements: [
          { text: "a) Điểm mới và độc đáo trong quyết định ra đi tìm đường cứu nước của Nguyễn Tất Thành (1911) là việc xác định mục đích và lựa chọn hướng đi.", is_true: true },
          { text: "b) Việc Nguyễn Tất Thành ra đi tìm đường cứu nước (1911) đã giải quyết được sự khủng hoảng về đường lối cứu nước giải phóng dân tộc Việt Nam.", is_true: false },
          { text: "c) Chứng kiến cảnh đất nước bị mất độc lập, được kế thừa những truyền thống tốt đẹp của dân tộc, quê hương và gia đình, Nguyễn Tất Thành sớm có ý chí cứu nước, giải phóng dân tộc.", is_true: true },
          { text: "d) Kế thừa tinh thần yêu nước của các bậc tiền bối, giữa năm 1911, Nguyễn Tất Thành rời Bến cảng Nhà Rồng, hướng sang phương Đông để bắt đầu cuộc hành trình tìm đường cứu nước.", is_true: false }
        ]
      },
      {
        id: "p2_q8", type: "true_false",
        question: "Câu 8. Đọc đoạn tư liệu sau:\n“Xứ Đông Dương bị chủ nghĩa tư bản Pháp bóc lột để làm giàu cho một số cá mập! Người ta đưa người Đông Dương vào chỗ chết trong cuộc chém giết của bọn tư bản để bảo vệ những cái gì mà chính họ cũng không hề biết. Người ta đầu độc họ bằng rượu cồn và thuốc phiện. Người ta kìm họ trong ngu dốt…”",
        statements: [
          { text: "a) Xứ Đông Dương trong đoạn trích là nói tới các nước trong khu vực Đông Nam Á.", is_true: false },
          { text: "b) Thực dân Pháp đến Đông Dương với sứ mệnh chính là khai hóa văn minh và phát triển kinh tế cho người bản xứ.", is_true: false },
          { text: "c) Cụm từ 'một số cá mập' ám chỉ những thế lực tư bản thực dân đang lũng đoạn và vơ vét thuộc địa.", is_true: true },
          { text: "d) Trong quá trình khai thác bóc lột, Hồ Chí Minh đề cập đến việc chủ nghĩa tư bản Pháp chú trọng nhất về vấn đề văn hoá nhằm làm cho người thuộc địa trở thành nô lệ.", is_true: false }
        ]
      }
    ];

    // 2. BIẾN TRẠNG THÁI (STATE)
    let queue = [];
    let totalQuestions = 0;
    let stats = { wrong: 0 };
    let currentQ = null;
    let feedbackMode = false;
    let isCurrentCorrect = false;

    let userMcqAns = null;
    let userTfAns = [];
    let userShortAns = "";

    // 3. LOGIC KHỞI TẠO & ĐIỀU HƯỚNG
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function initApp() {
      let initialQueue = examData.map(q => q.id);
      queue = shuffleArray(initialQueue);
      
      totalQuestions = examData.length;
      stats.wrong = 0;
      loadNextQuestion();
    }

    function loadNextQuestion() {
      if (queue.length === 0) {
        renderFinishScreen();
        return;
      }
      const currentId = queue[0];
      currentQ = examData.find(q => q.id === currentId);
      
      feedbackMode = false;
      userMcqAns = null;
      userTfAns = currentQ.type === 'true_false' ? new Array(currentQ.statements.length).fill(null) : [];
      userShortAns = "";
      
      renderApp();
    }

    function checkAnswer() {
      isCurrentCorrect = false;

      if (currentQ.type === 'multiple_choice') {
        isCurrentCorrect = (userMcqAns === currentQ.correct_answer);
      } 
      else if (currentQ.type === 'true_false') {
        isCurrentCorrect = userTfAns.every((ans, idx) => ans === currentQ.statements[idx].is_true);
      } 

      feedbackMode = true;
      renderApp();
    }

    function nextStep() {
      const currentId = queue.shift(); 
      if (!isCurrentCorrect) {
        queue.push(currentId); 
        stats.wrong++;
      }
      loadNextQuestion();
    }

    // 4. CÁC HÀM XỬ LÝ SỰ KIỆN TỪ GIAO DIỆN
    function selectMcq(idx) {
      if(feedbackMode) return;
      userMcqAns = idx;
      checkReadyBtn();
      renderApp();
    }

    function selectTf(stmtIdx, boolVal) {
      if(feedbackMode) return;
      userTfAns[stmtIdx] = boolVal;
      checkReadyBtn();
      renderApp();
    }

    function checkReadyBtn() {
      const btn = document.getElementById('checkBtn');
      if(!btn) return;
      let ready = false;
      if (currentQ.type === 'multiple_choice') ready = userMcqAns !== null;
      if (currentQ.type === 'true_false') ready = !userTfAns.includes(null);
      
      btn.disabled = !ready;
      btn.className = ready 
        ? "w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-4 rounded-xl shadow-md transition-all text-lg"
        : "w-full bg-gray-300 text-white font-bold py-4 rounded-xl cursor-not-allowed text-lg";
    }

    // 5. RENDER HTML (GIAO DIỆN)
    function renderApp() {
      const app = document.getElementById('app');
      
      const progressRatio = ((totalQuestions - queue.length) / totalQuestions) * 100;
      const progressHtml = `
        <div class="mb-6 bg-white p-4 rounded-2xl shadow-sm border border-amber-100">
          <div class="flex justify-between text-sm font-semibold text-amber-800 mb-2">
            <span>Tiến độ hoàn thành môn Lịch Sử</span>
            <span>${totalQuestions - queue.length + 1} / ${totalQuestions}</span>
          </div>
          <div class="w-full bg-amber-100 rounded-full h-3">
            <div class="bg-amber-600 h-3 rounded-full transition-all duration-500" style="width: ${progressRatio}%"></div>
          </div>
          ${queue.length > totalQuestions ? '<p class="text-xs text-red-500 mt-2 font-medium">Đang làm lại các câu sai...</p>' : ''}
        </div>
      `;

      let questionHtml = `<div class="bg-white rounded-2xl shadow-md p-6 mb-6 border border-amber-50">
        <h2 class="text-lg font-bold text-gray-800 mb-6 whitespace-pre-line leading-relaxed">${currentQ.question}</h2>`;

      if (currentQ.image) {
        questionHtml += `
          <div class="mb-6 flex justify-center">
            <img src="${currentQ.image}" alt="Hình minh họa" class="max-w-full h-auto rounded-lg border border-gray-200">
          </div>
        `;
      }

      if (currentQ.type === 'multiple_choice') {
        questionHtml += `<div class="space-y-3">`;
        currentQ.options.forEach((opt, idx) => {
          let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all border-gray-200 hover:border-amber-400";
          if (userMcqAns === idx) btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all border-amber-500 bg-amber-50";
          
          if (feedbackMode) {
            if (idx === currentQ.correct_answer) btnClass += " correct-ans";
            else if (userMcqAns === idx && !isCurrentCorrect) btnClass += " wrong-ans";
          }

          questionHtml += `<button onclick="selectMcq(${idx})" class="${btnClass}" ${feedbackMode ? 'disabled' : ''}>${opt}</button>`;
        });
        questionHtml += `</div>`;
      }

      if (currentQ.type === 'true_false') {
        questionHtml += `<div class="space-y-4">`;
        currentQ.statements.forEach((stmt, idx) => {
          
          const isStmtCorrect = (userTfAns[idx] === stmt.is_true);
          let btnTrueClass = userTfAns[idx] === true ? "tf-selected" : "bg-white text-gray-600 border-gray-300";
          let btnFalseClass = userTfAns[idx] === false ? "tf-selected" : "bg-white text-gray-600 border-gray-300";
          
          let rowFeedbackHtml = '';
          let rowBorderClass = 'border-gray-200';

          if (feedbackMode) {
            if (isStmtCorrect) {
                rowBorderClass = 'border-green-400 bg-green-50';
                if (userTfAns[idx] === true) btnTrueClass += " correct-ans";
                if (userTfAns[idx] === false) btnFalseClass += " correct-ans";
                rowFeedbackHtml = `<div class="text-sm font-bold text-green-600 w-full sm:w-auto mt-2 sm:mt-0 text-right">✅ Chính xác</div>`;
            } else {
                rowBorderClass = 'border-red-400 bg-red-50';
                if (userTfAns[idx] === true) btnTrueClass += " wrong-ans";
                if (userTfAns[idx] === false) btnFalseClass += " wrong-ans";
                rowFeedbackHtml = `<div class="text-sm font-bold text-red-600 w-full sm:w-auto mt-2 sm:mt-0 text-right">❌ Sai (Đáp án: ${stmt.is_true ? 'Đúng' : 'Sai'})</div>`;
            }
          }

          questionHtml += `
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 border-2 ${rowBorderClass} rounded-xl gap-4 transition-all">
              <span class="flex-1 text-gray-800 font-medium">${stmt.text}</span>
              <div class="flex gap-2 shrink-0">
                <button onclick="selectTf(${idx}, true)" class="px-4 py-2 rounded-lg font-semibold border-2 transition-all ${btnTrueClass}" ${feedbackMode ? 'disabled' : ''}>Đúng</button>
                <button onclick="selectTf(${idx}, false)" class="px-4 py-2 rounded-lg font-semibold border-2 transition-all ${btnFalseClass}" ${feedbackMode ? 'disabled' : ''}>Sai</button>
              </div>
              ${rowFeedbackHtml}
            </div>
          `;
        });
        questionHtml += `</div>`;
      }

      questionHtml += `</div>`;

      let actionHtml = '';
      if (!feedbackMode) {
        actionHtml = `<button id="checkBtn" onclick="checkAnswer()" disabled class="w-full bg-gray-300 text-white font-bold py-4 rounded-xl cursor-not-allowed text-lg transition-all">Kiểm tra</button>`;
      } else {
        const fbClass = isCurrentCorrect ? 'bg-green-50 border-green-500 text-green-700' : 'bg-red-50 border-red-500 text-red-700';
        const fbText = isCurrentCorrect ? '✅ Trả lời chính xác!' : '❌ Chưa chính xác! Câu này sẽ được lưu lại để ôn tập sau.';
        const btnClass = isCurrentCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700';
        
        actionHtml = `
          <div class="p-4 rounded-xl border-2 flex items-center justify-between ${fbClass}">
            <span class="font-bold text-lg">${fbText}</span>
            <button onclick="nextStep()" class="px-6 py-2 font-bold rounded-lg text-white transition-all ${btnClass}">Tiếp tục</button>
          </div>
        `;
      }

      app.innerHTML = progressHtml + questionHtml + actionHtml;
      if(!feedbackMode) checkReadyBtn();
    }

    function renderFinishScreen() {
      document.getElementById('app').innerHTML = `
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full text-center mx-auto mt-10 border border-amber-100">
          <h1 class="text-3xl font-bold text-amber-600 mb-4">🎉 Tuyệt vời!</h1>
          <p class="text-gray-600 mb-6">Bạn đã thuộc lòng bộ câu hỏi Lịch Sử này. Chúc bạn thi tốt nhé!</p>
          <div class="bg-amber-50 rounded-lg p-4 mb-6">
            <p class="text-lg font-semibold text-gray-700">Tổng số lần giải sai: <span class="text-red-500">${stats.wrong}</span></p>
          </div>
          <button onclick="initApp()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-4 rounded-xl transition-all">
            Làm lại từ đầu
          </button>
        </div>
      `;
    }

    window.onload = initApp;
  </script>
</body>
</html>
