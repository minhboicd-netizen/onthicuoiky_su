    // 2. BIẾN TRẠNG THÁI (STATE)
    let queue = [];
    let totalQuestions = 0;
    let stats = { wrong: 0 };
    let currentQ = null;
    let feedbackMode = false;
    let isCurrentCorrect = false;

    // Biến lưu câu trả lời tạm thời của User
    let userMcqAns = null;
    let userTfAns = [];
    let userShortAns = "";

    // 3. LOGIC KHỞI TẠO & ĐIỀU HƯỚNG
    function initApp() {
      queue = examData.map(q => q.id);
      totalQuestions = examData.length;
      stats.wrong = 0;
      loadNextQuestion();
    }

    function loadNextQuestion() {
      if (queue.length === 0) {
        renderFinishScreen();
        return;
      }
      // Lấy câu hỏi đầu tiên trong hàng đợi
      const currentId = queue[0];
      currentQ = examData.find(q => q.id === currentId);
      
      // Reset trạng thái
      feedbackMode = false;
      userMcqAns = null;
      userTfAns = currentQ.type === 'true_false' ? new Array(currentQ.statements.length).fill(null) : [];
      userShortAns = "";
      
      renderApp();
    }

    function checkAnswer() {
      isCurrentCorrect = false;

      if (currentQ.type === 'multiple_choice') {
        isCurrentCorrect = (userMcqAns === currentQ.correct_answer);
      } 
      else if (currentQ.type === 'true_false') {
        isCurrentCorrect = userTfAns.every((ans, idx) => ans === currentQ.statements[idx].is_true);
      } 
      else if (currentQ.type === 'short_answer') {
        const normalize = (str) => str.toString().trim().toLowerCase();
        isCurrentCorrect = (normalize(userShortAns) === normalize(currentQ.correct_answer));
      }

      feedbackMode = true;
      renderApp();
    }

    function nextStep() {
      const currentId = queue.shift(); // Xóa câu hiện tại khỏi đầu hàng đợi
      if (!isCurrentCorrect) {
        queue.push(currentId); // Nếu sai, tống xuống cuối hàng đợi
        stats.wrong++;
      }
      loadNextQuestion();
    }

    // 4. CÁC HÀM XỬ LÝ SỰ KIỆN TỪ GIAO DIỆN
    function selectMcq(idx) {
      if(feedbackMode) return;
      userMcqAns = idx;
      renderApp();
    }

    function selectTf(stmtIdx, boolVal) {
      if(feedbackMode) return;
      userTfAns[stmtIdx] = boolVal;
      renderApp();
    }

    function inputShortAns(val) {
      userShortAns = val;
      checkReadyBtn();
    }

    function checkReadyBtn() {
      const btn = document.getElementById('checkBtn');
      if(!btn) return;
      let ready = false;
      if (currentQ.type === 'multiple_choice') ready = userMcqAns !== null;
      if (currentQ.type === 'true_false') ready = !userTfAns.includes(null);
      if (currentQ.type === 'short_answer') ready = userShortAns.trim() !== "";
      
      btn.disabled = !ready;
      btn.className = ready 
        ? "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition-all text-lg"
        : "w-full bg-gray-300 text-white font-bold py-4 rounded-xl cursor-not-allowed text-lg";
    }

    // 5. RENDER HTML (GIAO DIỆN)
    function renderApp() {
      const app = document.getElementById('app');
      
      // Thanh tiến độ
      const progressRatio = ((totalQuestions - queue.length) / totalQuestions) * 100;
      const progressHtml = `
        <div class="mb-6">
          <div class="flex justify-between text-sm font-semibold text-gray-600 mb-2">
            <span>Tiến độ hoàn thành</span>
            <span>${totalQuestions - queue.length + 1} / ${totalQuestions}</span>
          </div>
          <div class="w-full bg-gray-300 rounded-full h-3">
            <div class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: ${progressRatio}%"></div>
          </div>
          ${queue.length > totalQuestions ? '<p class="text-xs text-red-500 mt-2 font-medium">Đang làm lại các câu sai...</p>' : ''}
        </div>
      `;

      // Khung câu hỏi
      let questionHtml = `<div class="bg-white rounded-2xl shadow-md p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-6 whitespace-pre-line leading-relaxed">${currentQ.question}</h2>`;

      // HTML cho Trắc nghiệm
      if (currentQ.type === 'multiple_choice') {
        questionHtml += `<div class="space-y-3">`;
        currentQ.options.forEach((opt, idx) => {
          let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all border-gray-200 hover:border-blue-300";
          if (userMcqAns === idx) btnClass += " btn-selected";
          
          if (feedbackMode) {
            if (idx === currentQ.correct_answer) btnClass += " correct-ans";
            else if (userMcqAns === idx && !isCurrentCorrect) btnClass += " wrong-ans";
          }

          questionHtml += `<button onclick="selectMcq(${idx})" class="${btnClass}" ${feedbackMode ? 'disabled' : ''}>${opt}</button>`;
        });
        questionHtml += `</div>`;
      }

      // HTML cho Đúng/Sai
      if (currentQ.type === 'true_false') {
        questionHtml += `<div class="space-y-4">`;
        currentQ.statements.forEach((stmt, idx) => {
          let btnTrueClass = userTfAns[idx] === true ? "tf-selected" : "bg-white text-gray-600 border-gray-300";
          let btnFalseClass = userTfAns[idx] === false ? "tf-selected" : "bg-white text-gray-600 border-gray-300";
          
          questionHtml += `
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-gray-50 border rounded-xl gap-4">
              <span class="flex-1 text-gray-700">${stmt.text}</span>
              <div class="flex gap-2 shrink-0">
                <button onclick="selectTf(${idx}, true)" class="px-4 py-2 rounded-lg font-semibold border-2 transition-all ${btnTrueClass}" ${feedbackMode ? 'disabled' : ''}>Đúng</button>
                <button onclick="selectTf(${idx}, false)" class="px-4 py-2 rounded-lg font-semibold border-2 transition-all ${btnFalseClass}" ${feedbackMode ? 'disabled' : ''}>Sai</button>
              </div>
              ${feedbackMode && !isCurrentCorrect ? `<div class="text-sm font-bold text-red-500 w-full sm:w-auto mt-2 sm:mt-0 text-right">Đáp án: ${stmt.is_true ? 'Đúng' : 'Sai'}</div>` : ''}
            </div>
          `;
        });
        questionHtml += `</div>`;
      }

      // HTML cho Trả lời ngắn
      if (currentQ.type === 'short_answer') {
        questionHtml += `
          <div>
            <input type="text" id="shortInput" oninput="inputShortAns(this.value)" value="${userShortAns}" placeholder="Nhập câu trả lời của bạn..." 
            class="w-full p-4 border-2 border-gray-300 rounded-xl focus:border-blue-500 focus:outline-none transition-all text-lg" ${feedbackMode ? 'disabled' : ''}>
            ${feedbackMode && !isCurrentCorrect ? `<p class="mt-3 text-red-600 font-semibold bg-red-50 p-3 rounded-lg border border-red-200">Đáp án đúng: ${currentQ.correct_answer}</p>` : ''}
          </div>
        `;
      }

      questionHtml += `</div>`;

      // Khung Nút Bấm / Feedback
      let actionHtml = '';
      if (!feedbackMode) {
        actionHtml = `<button id="checkBtn" onclick="checkAnswer()" disabled class="w-full bg-gray-300 text-white font-bold py-4 rounded-xl cursor-not-allowed text-lg transition-all">Kiểm tra</button>`;
      } else {
        const fbClass = isCurrentCorrect ? 'bg-green-50 border-green-500 text-green-700' : 'bg-red-50 border-red-500 text-red-700';
        const fbText = isCurrentCorrect ? '✅ Chính xác! Bạn làm rất tốt.' : '❌ Sai rồi! Câu này sẽ được lưu lại để làm sau.';
        const btnClass = isCurrentCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700';
        
        actionHtml = `
          <div class="p-4 rounded-xl border-2 flex items-center justify-between ${fbClass}">
            <span class="font-bold text-lg">${fbText}</span>
            <button onclick="nextStep()" class="px-6 py-2 font-bold rounded-lg text-white transition-all ${btnClass}">Tiếp tục</button>
          </div>
        `;
      }

      app.innerHTML = progressHtml + questionHtml + actionHtml;
      if(!feedbackMode) checkReadyBtn();
    }

    function renderFinishScreen() {
      document.getElementById('app').innerHTML = `
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full text-center mx-auto mt-10">
          <h1 class="text-3xl font-bold text-green-600 mb-4">🎉 Tuyệt vời!</h1>
          <p class="text-gray-600 mb-6">Bạn đã hoàn thành 100% đề thi. Bạn đã khắc phục được toàn bộ các câu sai.</p>
          <div class="bg-gray-100 rounded-lg p-4 mb-6">
            <p class="text-lg font-semibold text-gray-700">Tổng số lần giải sai: <span class="text-red-500">${stats.wrong}</span></p>
          </div>
          <button onclick="initApp()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all">
            Làm lại từ đầu
          </button>
        </div>
      `;
    }

    // 6. KHỞI CHẠY ỨNG DỤNG KHI TRANG TẢI XONG
    window.onload = initApp;

  </script>
</body>
</html>
